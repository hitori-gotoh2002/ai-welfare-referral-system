name: Inline backend runtime patch

on:
  push:
    branches:
      - main
    paths:
      - backend_runtime_patch.py
      - server_entry.py
      - render.yaml
      - .github/workflows/inline-backend-runtime-patch.yml

permissions:
  contents: write

jobs:
  patch-backend-entry:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch direct backend_server.py start
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend_server.py")
          text = path.read_text(encoding="utf-8")
          old = 'if __name__ == "__main__":\n    run()\n'
          new = '''if __name__ == "__main__":
              try:
                  import backend_runtime_patch

                  backend_runtime_patch.apply()
              except Exception as error:
                  print(f"Runtime patch skipped: {error}")
              run()
          '''
          if new not in text:
              if old not in text:
                  raise SystemExit("backend_server.py entrypoint shape changed")
              text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- backend_server.py; then
            git add backend_server.py
            git commit -m "Apply runtime patch in backend_server entrypoint"
            git push
          fi
