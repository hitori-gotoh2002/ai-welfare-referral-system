name: Patch age target filtering from comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  patch:
    if: contains(github.event.comment.body, 'run-age-target-filter-patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply age target filtering patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          backend = Path("backend_server.py")
          app = Path("app.js")
          backend_text = backend.read_text(encoding="utf-8")
          app_text = app.read_text(encoding="utf-8")

          backend_age_block = '''AGE_TARGET_PATTERNS = {
    "아동": r"아동|영유아|유아|어린이|초등학생|초등|미취학",
    "청소년": r"청소년|중학생|고등학생|학교\s*밖|위기청소년|청소년특별지원",
    "청년": r"청년|대학생|사회초년생",
    "노인": r"노인|어르신|고령|독거노인|기초연금|장기요양",
}


def age_groups_from_text(text: str) -> set[str]:
    cleaned = clean_text(text)
    groups = {group for group, pattern in AGE_TARGET_PATTERNS.items() if re.search(pattern, cleaned)}

    for match in re.finditer(r"(?<!\d)(\d{1,3})\s*세", cleaned):
        try:
            age = int(match.group(1))
        except ValueError:
            continue
        if age >= 65:
            groups.add("노인")
        elif age >= 19:
            groups.add("청년")
        elif age >= 13:
            groups.add("청소년")
        else:
            groups.add("아동")

    return groups


def case_age_groups(case: dict[str, Any], structured: dict[str, Any] | None = None) -> set[str]:
    case_text_groups = age_groups_from_text(" ".join(str(case.get(key, "")) for key in ("title", "memo")))
    if case_text_groups:
        return case_text_groups

    structured_groups = age_groups_from_text(str(structured.get("target", ""))) if structured else set()
    if structured_groups:
        return structured_groups

    return age_groups_from_text(str(case.get("targetType", "")))


def service_age_groups(service: dict[str, Any]) -> set[str]:
    parts = [
        service.get("name", ""),
        service.get("target", ""),
        service.get("summary", ""),
        service.get("eligibility", ""),
        service.get("support", ""),
        service.get("process", ""),
    ]
    return age_groups_from_text(" ".join(str(part) for part in parts if part))


def target_compatible(
    service: dict[str, Any], case: dict[str, Any], structured: dict[str, Any] | None = None
) -> bool:
    case_groups = case_age_groups(case, structured)
    service_groups = service_age_groups(service)
    if not case_groups or not service_groups:
        return True
    return bool(case_groups & service_groups)


def service_score(
    service: dict[str, Any], needs: list[str], case: dict[str, Any], structured: dict[str, Any] | None = None
) -> int:
    if not target_compatible(service, case, structured):
        return 0

    overlap = len([domain for domain in service["domains"] if domain in needs])
    urgent = 1 if service["urgency"] == "긴급" else 0
    region = case.get("region", "")
    region_match = 1 if service["region"] == "전국" or service["region"] in region else 0
    target_match = 1 if case_age_groups(case, structured) & service_age_groups(service) else 0
    return overlap * 4 + urgent * 2 + region_match + target_match
'''

          start = backend_text.find("AGE_TARGET_PATTERNS =")
          if start == -1:
              start = backend_text.index("def service_score(")
          end = backend_text.index("\ndef filter_local_services", start)
          backend_text = backend_text[:start] + backend_age_block + backend_text[end:]
          backend_text = backend_text.replace(
              '    case = {"region": query.get("region", [""])[0] or ""}\n',
              '    case = {"region": query.get("region", [""])[0] or "", "targetType": query.get("target", [""])[0] or ""}\n',
          )

          backend_coverage_block = '''def ensure_coverage(
    items: list[dict[str, Any]],
    needs: list[str],
    catalog: list[dict[str, Any]] | None = None,
    case: dict[str, Any] | None = None,
    structured: dict[str, Any] | None = None,
) -> list[dict[str, Any]]:
    selected = list(items)
    source_catalog = catalog or SERVICES
    case = case or {}
    domains = {domain for service in selected for domain in service["domains"]}
    for need in needs[:4]:
        if need not in domains:
            found = next(
                (
                    service
                    for service in source_catalog
                    if need in service["domains"]
                    and service not in selected
                    and target_compatible(service, case, structured)
                ),
                None,
            )
            if found:
                selected.append(found)
                domains.update(found["domains"])
    if len({domain for service in selected for domain in service["domains"]}) < 2:
        fallback = next(
            (service for service in source_catalog if service not in selected and target_compatible(service, case, structured)),
            None,
        )
        if fallback:
            selected.append(fallback)
    return selected[:5]
'''
          start = backend_text.index("def ensure_coverage(")
          end = backend_text.index("\ndef build_package", start)
          backend_text = backend_text[:start] + backend_coverage_block + backend_text[end:]

          backend_generate_block = '''def generate_packages(
    case: dict[str, Any], structured: dict[str, Any] | None, catalog: list[dict[str, Any]] | None = None
) -> list[dict[str, Any]]:
    if not structured:
        structured = analyze_case(case)
    needs = structured.get("needs") or ["생계", "주거"]
    source_catalog = [service for service in (catalog or SERVICES) if target_compatible(service, case, structured)]
    ranked = sorted(
        [service for service in source_catalog if service_score(service, needs, case, structured) > 0],
        key=lambda service: service_score(service, needs, case, structured),
        reverse=True,
    )
    urgent_first = [service for service in ranked if service["urgency"] == "긴급"]
    general = [service for service in ranked if service["urgency"] != "긴급"]
    mixed = unique_services([*urgent_first, *general])

    top_a = ensure_coverage(mixed[:4], needs, source_catalog, case, structured)
    top_b = ensure_coverage(
        unique_services(
            [
                *[service for service in ranked if "취업" in service["domains"] or "심리" in service["domains"]],
                *ranked,
            ]
        )[:4],
        needs,
        source_catalog,
        case,
        structured,
    )
    top_c = ensure_coverage(
        unique_services(
            [
                *[service for service in ranked if service["source"] in ("기관", "민간")],
                *ranked,
            ]
        )[:4],
        needs,
        source_catalog,
        case,
        structured,
    )

    return [
        build_package("pkg-1", "긴급 안정 패키지", "체납·생계·심리 위험을 먼저 낮추는 조합", top_a, 94),
        build_package("pkg-2", "회복·자립 패키지", "단기 지원 이후 취업과 마음건강을 함께 연결", top_b, 88),
        build_package("pkg-3", "지역기관 연계 패키지", "공공 제도와 민간·지역기관 접점을 병합", top_c, 83),
    ]
'''
          start = backend_text.index("def generate_packages(")
          end = backend_text.index("\ndef build_report", start)
          backend_text = backend_text[:start] + backend_generate_block + backend_text[end:]

          app_age_block = '''const ageTargetPatterns = {
  아동: /아동|영유아|유아|어린이|초등학생|초등|미취학/,
  청소년: /청소년|중학생|고등학생|학교\s*밖|위기청소년|청소년특별지원/,
  청년: /청년|대학생|사회초년생/,
  노인: /노인|어르신|고령|독거노인|기초연금|장기요양/,
};

function ageGroupsFromText(text) {
  const value = String(text || "");
  const groups = new Set();

  Object.entries(ageTargetPatterns).forEach(([group, pattern]) => {
    if (pattern.test(value)) groups.add(group);
  });

  [...value.matchAll(/(?<!\d)(\d{1,3})\s*세/g)].forEach((match) => {
    const age = Number(match[1]);
    if (!Number.isFinite(age)) return;
    if (age >= 65) groups.add("노인");
    else if (age >= 19) groups.add("청년");
    else if (age >= 13) groups.add("청소년");
    else groups.add("아동");
  });

  return groups;
}

function currentCaseAgeGroups() {
  const caseTextGroups = ageGroupsFromText([state.case.title, state.case.memo].filter(Boolean).join(" "));
  if (caseTextGroups.size) return caseTextGroups;

  const structuredGroups = ageGroupsFromText(state.structured?.target || "");
  if (structuredGroups.size) return structuredGroups;

  return ageGroupsFromText(state.case.targetType || "");
}

function serviceAgeGroups(service) {
  return ageGroupsFromText(
    [service.name, service.target, service.summary, service.eligibility, service.support, service.process].filter(Boolean).join(" ")
  );
}

function serviceMatchesCaseTarget(service) {
  const caseGroups = currentCaseAgeGroups();
  const targetGroups = serviceAgeGroups(service);
  if (!caseGroups.size || !targetGroups.size) return true;
  return [...caseGroups].some((group) => targetGroups.has(group));
}

function serviceScore(service, needs) {
  if (!serviceMatchesCaseTarget(service)) return 0;

  const overlap = service.domains.filter((domain) => needs.includes(domain)).length;
  const urgent = service.urgency === "긴급" ? 1 : 0;
  const region = state.case.region && (service.region === "전국" || state.case.region.includes(service.region)) ? 1 : 0;
  const targetMatch = [...currentCaseAgeGroups()].some((group) => serviceAgeGroups(service).has(group)) ? 1 : 0;
  return overlap * 4 + urgent * 2 + region + targetMatch;
}
'''
          start = app_text.find("const ageTargetPatterns")
          if start == -1:
              start = app_text.index("function serviceScore(")
          end = app_text.index("\nfunction generatePackagesLocal", start)
          app_text = app_text[:start] + app_age_block + app_text[end:]

          app_coverage_block = '''function ensureCoverage(items, needs) {
  const selected = [...items];
  const domains = new Set(selected.flatMap((item) => item.domains));
  needs.slice(0, 4).forEach((need) => {
    if (!domains.has(need)) {
      const found = services.find(
        (service) => serviceMatchesCaseTarget(service) && service.domains.includes(need) && !selected.some((item) => item.id === service.id)
      );
      if (found) selected.push(found);
    }
  });
  if (new Set(selected.flatMap((item) => item.domains)).size < 2) {
    const add = services.find((service) => serviceMatchesCaseTarget(service) && !selected.some((item) => item.id === service.id));
    if (add) selected.push(add);
  }
  return selected.slice(0, 5);
}
'''
          start = app_text.index("function ensureCoverage(")
          end = app_text.index("\nfunction buildPackage", start)
          app_text = app_text[:start] + app_coverage_block + app_text[end:]

          app_text = re.sub(
              r'(      needs: \(state\.structured\?\.needs \|\| state\.case\.issueTypes\)\.join\(","\),\n      region: state\.case\.region \|\| "",\n)(?!      target:)',
              r'\1      target: state.structured?.target || state.case.targetType || "",\n',
              app_text,
          )

          backend.write_text(backend_text, encoding="utf-8")
          app.write_text(app_text, encoding="utf-8")
          PY

      - name: Validate patch
        run: |
          python -m py_compile backend_server.py
          python - <<'PY'
          from backend_server import generate_packages, service_score, target_compatible
          case = {"targetType":"청년","title":"노인 상담","region":"서울 관악구","memo":"서울 관악구에 거주하는 72세 독거 어르신입니다. 월세와 식사, 방문 돌봄 지원이 필요합니다."}
          structured = {"needs":["생계","주거","돌봄"],"target":"노인","region":"서울 관악구"}
          youth = {"id":"public-test-youth","name":"청소년특별지원","source":"중앙","region":"전국","target":"청소년","domains":["생계","의료","돌봄","주거"],"urgency":"긴급","summary":"청소년에게 생활지원과 상담을 제공합니다.","eligibility":"위기 청소년","support":"생활지원","process":"신청"}
          elder = {"id":"public-test-elder","name":"노인맞춤돌봄서비스","source":"중앙","region":"전국","target":"노인","domains":["돌봄","생계"],"urgency":"긴급","summary":"어르신에게 방문 돌봄을 제공합니다.","eligibility":"노인 돌봄 필요","support":"방문 돌봄","process":"신청"}
          ids = [item["serviceId"] for package in generate_packages(case, structured, [youth, elder]) for item in package["items"]]
          assert not target_compatible(youth, case, structured)
          assert service_score(youth, structured["needs"], case, structured) == 0
          assert "public-test-youth" not in ids
          assert "public-test-elder" in ids
          PY
          node --check app.js

      - name: Commit patched files and remove workflows
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add app.js backend_server.py
          git commit -m "Fix age-target filtering for packages"
          git rm .github/workflows/patch-age-target-filter.yml .github/workflows/patch-age-target-filter-comment.yml
          git commit -m "Remove temporary patch workflows"
          git push
